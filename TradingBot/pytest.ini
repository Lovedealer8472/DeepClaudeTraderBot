[pytest]
# Pytest configuration for Scalper Bot tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring full bot setup
    slow: Slow tests that take significant time

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts = -v --cov=app --cov-report=html --cov-report=term

